# =========================================================================
# Base configuration — shared by every profile.
# Profile-specific overrides live in application-dev / application-prod.
# When no profile is active, this neutral in-memory H2 config is used
# (also the configuration the integration tests run against).
# =========================================================================

# H2 Database (default / no-profile)
spring.datasource.url=jdbc:h2:mem:midterm
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Allow Thymeleaf forms to issue PUT/DELETE via a hidden _method field
spring.mvc.hiddenmethod.filter.enabled=true

# Internationalization message bundles (UTF-8)
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# -------------------------------------------------------------------------
# Custom externalized configuration (bound to AppSettings, prefix app.settings)
# Neutral defaults; each profile overrides them.
# -------------------------------------------------------------------------
app.settings.title=Task Manager API
app.settings.pagination-limit=20
app.settings.contact-email=support@example.com
app.settings.registration-enabled=true

# -------------------------------------------------------------------------
# Actuator — production monitoring
# health + info are public; metrics/prometheus require ADMIN (see SecurityConfig).
# -------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
management.info.build.enabled=true

# Custom values surfaced on /actuator/info via the env contributor
info.app.name=Task Manager API
info.app.description=REST API for User and Task management
info.app.version=1.0.0
