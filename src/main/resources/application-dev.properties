# =========================================================================
# DEV profile — local development.
# In-memory H2 database, seeded with test data by DataInitializer,
# verbose SQL and DEBUG logging.
# Run with: --spring.profiles.active=dev
# =========================================================================

# In-memory H2 database
spring.datasource.url=jdbc:h2:mem:devdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 web console enabled for local inspection
spring.h2.console.enabled=true

# Custom configuration — development values
app.settings.title=Task Manager API (DEV)
app.settings.pagination-limit=10
app.settings.contact-email=dev-team@example.com
app.settings.registration-enabled=true
