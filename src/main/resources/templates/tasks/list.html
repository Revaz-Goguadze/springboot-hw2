<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(#{task.list.title})}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="container">
    <div class="header-row">
        <h1 th:text="#{task.list.title}">Tasks</h1>
        <a class="btn" th:href="@{/tasks/new}" th:text="#{task.new}">New task</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th th:text="#{field.title}">Title</th>
            <th th:text="#{field.completed}">Completed</th>
            <th th:text="#{field.user}">User</th>
            <th th:text="#{table.actions}">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${tasks}">
            <td th:text="${t.id}">1</td>
            <td th:text="${t.title}">Write tests</td>
            <td th:text="${t.completed} ? #{yes} : #{no}">No</td>
            <td th:text="${t.userName}">Alice</td>
            <td class="actions">
                <a th:href="@{/tasks/{id}/edit(id=${t.id})}" th:text="#{action.edit}">Edit</a>
                <form sec:authorize="hasRole('ADMIN')" th:action="@{/tasks/{id}(id=${t.id})}"
                      th:method="delete" class="inline"
                      th:onsubmit="'return confirm(\'' + #{action.delete.confirm} + '\');'">
                    <button type="submit" class="danger" th:text="#{action.delete}">Delete</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(tasks)}">
            <td colspan="5" class="empty" th:text="#{table.empty}">No data.</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
