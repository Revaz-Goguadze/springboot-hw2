<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{task.list.title})}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="container narrow">
    <h1 th:text="${editing} ? #{task.edit} : #{task.new}">Task</h1>

    <form th:action="@{${formAction}}" th:object="${task}" method="post">
        <input type="hidden" name="_method" value="put" th:if="${editing}"/>

        <label>
            <span th:text="#{field.title}">Title</span>
            <input type="text" th:field="*{title}"/>
            <span class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">title error</span>
        </label>

        <label>
            <span th:text="#{field.description}">Description</span>
            <textarea th:field="*{description}" rows="3"></textarea>
            <span class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">desc error</span>
        </label>

        <label class="checkbox">
            <input type="checkbox" th:field="*{completed}"/>
            <span th:text="#{field.completed}">Completed</span>
            <span class="error" th:if="${#fields.hasErrors('completed')}" th:errors="*{completed}">completed error</span>
        </label>

        <label>
            <span th:text="#{field.user}">User</span>
            <select th:field="*{userId}">
                <option value="" th:text="#{task.user.select}">Select a user</option>
                <option th:each="u : ${users}" th:value="${u.id}"
                        th:text="${u.name} + ' (' + ${u.email} + ')'">Alice</option>
            </select>
            <span class="error" th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}">user error</span>
        </label>

        <div class="form-actions">
            <button type="submit" th:text="#{action.save}">Save</button>
            <a class="btn-secondary" th:href="@{/tasks}" th:text="#{action.cancel}">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
