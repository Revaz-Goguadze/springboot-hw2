# =========================================================================
# PROD profile — production-like settings.
# Persistent PostgreSQL database, schema validated (never auto-created),
# no SQL echo, console disabled. Secrets come from environment variables.
# Run with: --spring.profiles.active=prod
# =========================================================================

# Persistent PostgreSQL database (values from the environment).
# DB_PASSWORD has no default: prod must fail visibly if the secret is missing.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskmanager}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:taskmanager}
spring.datasource.password=${DB_PASSWORD}

# Validate the existing schema; never mutate production data automatically
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable the H2 console in production
spring.h2.console.enabled=false

# Custom configuration — production values
app.settings.title=Task Manager API
app.settings.pagination-limit=50
app.settings.contact-email=support@taskmanager.example.com
app.settings.registration-enabled=false
